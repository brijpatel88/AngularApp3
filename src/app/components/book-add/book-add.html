
<section class="form-page">
  <div class="form-card">
    <div class="top-bar">
      <a routerLink="/books" class="back-btn">← Back to Books</a>
      <span class="form-tag">Add Book</span>
    </div>

    <h1>Add New Book</h1>

    <form (ngSubmit)="addBook()" #bookForm="ngForm">
      <div class="form-group">
        <label for="title">Title</label>
        <input
          id="title"
          type="text"
          name="title"
          [(ngModel)]="newBook.title"
          required
        />
      </div>

      <div class="form-group">
        <label for="author">Author</label>
        <input
          id="author"
          type="text"
          name="author"
          [(ngModel)]="newBook.author"
          required
        />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          name="description"
          rows="5"
          [(ngModel)]="newBook.description"
          required
        ></textarea>
      </div>

      <button type="submit" class="save-btn" [disabled]="bookForm.invalid">
        Save Book
      </button>
    </form>
  </div>
</section>
