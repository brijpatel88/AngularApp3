
<section class="form-page" *ngIf="book() as selectedBook">
  <div class="form-card">
    <div class="top-bar">
      <a [routerLink]="['/books', selectedBook.id]" class="back-btn">← Back to Details</a>
      <span class="form-tag">Update Book</span>
    </div>

    <h1>Update Book</h1>

    <form (ngSubmit)="updateBook()" #bookForm="ngForm">
      <div class="form-group">
        <label for="title">Title</label>
        <input
          id="title"
          type="text"
          name="title"
          [(ngModel)]="selectedBook.title"
          required
        />
      </div>

      <div class="form-group">
        <label for="author">Author</label>
        <input
          id="author"
          type="text"
          name="author"
          [(ngModel)]="selectedBook.author"
          required
        />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea
          id="description"
          name="description"
          rows="5"
          [(ngModel)]="selectedBook.description"
          required
        ></textarea>
      </div>

      <button type="submit" class="save-btn" [disabled]="bookForm.invalid">
        Update Book
      </button>
    </form>
  </div>
</section>
